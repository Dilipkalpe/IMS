# Optional: run local MongoDB without installing MongoDB Server
# Requires Docker Desktop: https://www.docker.com/products/docker-desktop/
#
#   docker compose up -d
#   npm run seed
#   npm run dev

services:
  mongodb:
    image: mongo:7
    container_name: ims-mongodb
    ports:
      - "27017:27017"
    volumes:
      - ims_mongo_data:/data/db

volumes:
  ims_mongo_data:
