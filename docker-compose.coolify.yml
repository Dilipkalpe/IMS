# IMS — Coolify / Docker Compose (repo root)
# Public URL: http://ims.144.91.98.218.nip.io/
# Coolify: assign domain to the "web" service → Domains (port 80)

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - ims_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ims
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/ims
      IMS_AUTH_SECRET: ${IMS_AUTH_SECRET:?Set IMS_AUTH_SECRET in Coolify env}
      IMS_PUBLIC_URL: ${IMS_PUBLIC_URL:-http://ims.144.91.98.218.nip.io}
    expose:
      - '3000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ./ims-web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - '80'
    environment:
      IMS_APP_NAME: IMS Application
      IMS_PUBLIC_URL: ${IMS_PUBLIC_URL:-http://ims.144.91.98.218.nip.io}
      # Coolify Traefik: bind ONLY this hostname to IMS web (not TMS)
      SERVICE_FQDN_WEB_80: ${SERVICE_FQDN_WEB_80:-ims.144.91.98.218.nip.io}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:80/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ims_mongo_data:
