# IMS on Contabo — place in /etc/nginx/sites-available/ims
# Then: sudo ln -sf /etc/nginx/sites-available/ims /etc/nginx/sites-enabled/ims
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN_OR_IP;

    client_max_body_size 25m;

    root /var/www/ims/web;
    index index.html;

    # React SPA (Vite build, base /)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Node.js API (PM2 on localhost:3000)
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Optional: health without /api prefix confusion
    location = /health {
        proxy_pass http://127.0.0.1:3000/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
