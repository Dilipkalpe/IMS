# Host nginx — route ims.* to IMS (Coolify Docker web container on port 8081)
# Install on Contabo (SSH as root):
#   sudo cp deploy/coolify/nginx-host-ims.conf /etc/nginx/sites-available/ims
#   sudo ln -sf /etc/nginx/sites-available/ims /etc/nginx/sites-enabled/ims
#   sudo nginx -t && sudo systemctl reload nginx
#
# Requires IMS docker-compose.coolify.yml web service: ports: ["8081:80"]
# TMS must keep its own vhost with ONLY: server_name tms.144.91.98.218.nip.io;

server {
    listen 80;
    listen [::]:80;
    server_name ims.144.91.98.218.nip.io;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
